---
# yaml-language-server: $schema=https://schema.maverickd650.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unpoller
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: unpoller
  interval: 1h
  path: ./kubernetes/apps/observability/unpoller/app
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
