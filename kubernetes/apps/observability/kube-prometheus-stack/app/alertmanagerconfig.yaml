---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/alertmanagerconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    groupBy:
      - "alertname"
      - "job"
    groupInterval: 5m
    groupWait: 1m
    receiver: discord
    repeatInterval: 12h
    routes:
      - receiver: blackhole
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: =
      - receiver: discord
        matchers:
          - name: severity
            value: critical
            matchType: =
  inhibitRules:
    - equal:
        - "alertname"
        - "namespace"
      sourceMatch:
        - name: severity
          value: critical
          matchType: =
      targetMatch:
        - name: severity
          value: warning
          matchType: =

  receivers:
    - name: blackhole
    - name: discord
      discordConfigs:
        - apiURL:
            name: alertmanager-secret
            key: ALERTMANAGER_DISCORD
          title: |-
            {{- if eq .Status "firing" }}🚨 **ALERT FIRING** 🚨{{- else }}✅ **ALERT RESOLVED** ✅{{- end }}
          message: |-
            {{- range .Alerts }}

            {{- if eq .Labels.severity "critical" }}
            🚨 **Severity:** `CRITICAL`
            {{- else if eq .Labels.severity "warning" }}
            ⚠️ **Severity:** `WARNING`
            {{- else if eq .Labels.severity "info" }}
            ℹ️ **Severity:** `INFO`
            {{- else }}
            > 📊 **Severity:** `{{ .Labels.severity }}`
            {{- end }}

            {{- if ne .Annotations.description "" }}
            📝 **Description:**

            ```
            {{ .Annotations.description }}
            ```
            {{- else if ne .Annotations.summary "" }}
            📋 **Summary:**
            ```
            {{ .Annotations.summary }}
            ```
            {{- else if ne .Annotations.message "" }}
            💬 **Message:**
            ```
            {{ .Annotations.message }}
            ```
            {{- else }}
            🔔 Alert has been triggered
            {{- end }}

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

            **Alert Details:**
            {{- if .Labels.node }}
            🖥️ **Node:** `{{ .Labels.node }}`
            {{- end }}
            {{- if .Labels.namespace }}
            Namespace: `{{ .Labels.namespace }}`
            {{- end }}
            {{- if .Labels.pod }}
            Pod: `{{ .Labels.pod }}`
            {{- end }}
            {{- if .Labels.job }}
            Job: `{{ .Labels.job }}`
            {{- end }}
            {{- if .Labels.instance }}
            Instance: `{{ .Labels.instance }}`
            {{- end }}
            {{- if .Labels.container }}
            Container: `{{ .Labels.container }}`
            {{- end }}
            {{- if .Labels.service }}
            Service: `{{ .Labels.service }}`
            {{- end }}

            ⏰ **Timeline:**
            {{- if eq .Status "firing" }}
            🔥 Started: <t:{{ .StartsAt.Unix }}:F> (<t:{{ .StartsAt.Unix }}:R>)
            {{- else }}
            ✅ Resolved: <t:{{ .EndsAt.Unix }}:F> (<t:{{ .EndsAt.Unix }}:R>)
            🕐 Duration: {{ .StartsAt | since | humanizeDuration }}
            {{- end }}

            {{- end }}
