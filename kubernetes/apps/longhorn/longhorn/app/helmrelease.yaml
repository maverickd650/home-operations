---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  releaseName: longhorn
  chartRef:
    kind: OCIRepository
    name: longhorn
  interval: 1h
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    defaultSettings:
      # Increase to 3 for a multi-node cluster
      defaultReplicaCount: "1"
      # Overprovisioning might be needed when using volsync
      storageOverProvisioningPercentage: "100000"
      storageReservedPercentageForDefaultDisk: "1"
      defaultDataPath: "/var/mnt/longhorn"
    csi:
      attacherReplicaCount: "1"
      provisionerReplicaCount: "1"
      resizerReplicaCount: "1"
      snapshotterReplicaCount: "1"
    persistence:
      # Set to false to pick another CSI as default
      defaultClass: true
      # Increase to 3 for a multi-node cluster
      defaultClassReplicaCount: "1"
    longhornUI:
      replicas: "1"
    metrics:
      serviceMonitor:
        enabled: true
