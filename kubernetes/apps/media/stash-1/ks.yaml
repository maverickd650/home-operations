---
# yaml-language-server: $schema=https://schema.maverickd650.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: stash-1
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: stash-1
  dependsOn:
    - name: volsync
      namespace: system
  interval: 1h
  path: ./kubernetes/apps/media/stash-1/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: true
