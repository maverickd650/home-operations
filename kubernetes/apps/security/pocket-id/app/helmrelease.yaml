---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
spec:
  chartRef:
    kind: OCIRepository
    name: common
    namespace: system
  interval: 1h
  timeout: 20m
  maxHistory: 3
  upgrade:
    cleanupOnFail: true
  uninstall:
    keepHistory: false
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/pocket-id/pocket-id
              tag: v2.9.0@sha256:a2a38a96699d7483d65b5849b015d954f294938306a03a9c0699bc5b79554e86
            env:
              DB_CONNECTION_STRING: file:/app/data/pocket-id.db?_journal_mode=WAL&_busy_timeout=2500&_txlock=immediate
              APP_URL: https://pocket.${SECRET_DOMAIN}
              TRUST_PROXY: "true"
              UPLOAD_PATH: /app/data/uploads
              METRICS_ENABLED: "true"
              OTEL_METRICS_EXPORTER: "prometheus"
            envFrom:
              - secretRef:
                  name: pocket-secret
    service:
      main:
        ports:
          main:
            port: 1411
    route:
      internal:
        hostnames:
          - pocket.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: pocket-id-config
        globalMounts:
          - path: /app/data
