---
# yaml-language-server: $schema=https://schema.maverickd650.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: pocket-id
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: pocket-id
  dependsOn:
    - name: longhorn
      namespace: longhorn-system
    - name: volsync
      namespace: system
  interval: 1h
  path: ./kubernetes/apps/security/pocket-id/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: OCIRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: security
  wait: false
