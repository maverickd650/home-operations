---
# yaml-language-server: $schema=https://schema.maverickd650.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: feedcord
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: common
    namespace: system
  upgrade:
    cleanupOnFail: true
  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/maverickd650/feedcord
              tag: 6.2.0@sha256:93bec196cee5583428f418ef45a749cb826f24cc66c756817342672408c8920d
            env:
              TZ: Europe/London
            envFrom:
              - secretRef:
                  name: feedcord-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/live
                    port: 9090
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: 9090
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
    service:
      main:
        ports:
          http:
            port: 9090
    persistence:
      config:
        type: configMap
        name: feedcord-config-main
        globalMounts:
          - subPath: appsettings.yaml
            path: /app/config/appsettings.yaml
