---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: echo
spec:
  chartRef:
    kind: OCIRepository
    name: echo
  interval: 1h
  values:
    replicaCount: 1
    config:
      kubernetes: true
    httpRoute:
      enabled: true
      hostnames:
        - "{{ .Release.Name }}.${SECRET_DOMAIN}"
      parentRefs:
        - name: envoy-external
          namespace: network
          sectionName: https
    monitoring:
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 64Mi
