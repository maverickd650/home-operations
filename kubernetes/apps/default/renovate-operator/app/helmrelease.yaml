---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  interval: 30m
  values:
    fullnameOverride: renovate-operator
    deployment:
      labels:
        app.kubernetes.io/name: renovate-operator
      podLabels:
        app.kubernetes.io/name: renovate-operator
    config:
      defaultJobBackoffLimit: 5
      defaultJobActiveDeadlineSeconds: 900
    route:
      enabled: true
      hostnames:
        - renovate.${SECRET_DOMAIN}
      parentRefs:
        - name: envoy-internal
          namespace: network
          sectionName: https
    webhook:
      enabled: true
      route:
        enabled: true
        hostnames:
          - renovate-webhook.${SECRET_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
    resources:
      requests:
        cpu: 10m
        memory: 100Mi
      limits:
        memory: 100Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      dashboard:
        enabled: true
