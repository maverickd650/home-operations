---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kubepage-operator
spec:
  interval: 1h
  ref:
    tag: 0.5.1
  url: oci://ghcr.io/maverickd650/charts/kubepage-operator
  verify:
    provider: cosign
    matchOIDCIdentity:
      - issuer: "https://token.actions.githubusercontent.com"
        subject: "^https://github.com/maverickd650/kubepage-operator.*$"
