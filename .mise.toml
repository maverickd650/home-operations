[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

[tools]
python = "3.14.6"
uv = "0.11.31"
pipx = "1.16.2"
talhelper = "3.1.13"
cilium-cli = "0.19.6"
cloudflared = "2026.7.2"
age = "1.3.1"
flux2 = "2.9.2"
gh = "2.96.0"
gum = "0.17.0"
sd = "1.1.0"
sops = "3.13.2"
task = "3.52.0"
helm = "4.2.3"
helmfile = "1.7.1"
jq = "1.8.2"
kustomize = "5.8.1"
lefthook = "2.1.10"
kubectl = "1.36.2"
yq = "4.53.3"
talosctl = "1.13.7"
kubeconform = "0.8.0"
zizmor = "1.28.0"

[hooks]
postinstall = "lefthook install"
