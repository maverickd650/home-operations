[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

[tools]
python = "3.14.6"
uv = "0.11.23"
pipx = "1.14.1"
talhelper = "3.1.11"
cilium-cli = "0.19.4"
cloudflared = "2026.6.1"
age = "1.3.1"
flux2 = "2.8.8"
gh = "2.95.0"
gum = "0.17.0"
sd = "1.1.0"
sops = "3.13.1"
task = "3.51.1"
helm = "4.2.2"
helmfile = "1.5.5"
jq = "1.8.2"
kustomize = "5.8.1"
lefthook = "2.1.9"
kubectl = "1.36.2"
yq = "4.53.3"
talosctl = "1.13.4"
kubeconform = "0.8.0"
zizmor = "1.25.2"

[hooks]
postinstall = "lefthook install"
