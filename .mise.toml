[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"

[tools]
python = "3.14.5"
uv = "0.11.16"
pipx = "1.12.0"
talhelper = "3.1.10"
cilium-cli = "0.19.4"
cli = "2.92.0"
cloudflared = "2026.5.2"
age = "1.3.1"
flux2 = "2.8.8"
sops = "3.13.1"
task = "3.51.1"
helm = "4.2.0"
helmfile = "1.5.2"
jq = "1.8.1"
kustomize = "5.7.1"
kubectl = "1.36.1"
yq = "4.53.2"
talosctl = "1.13.3"
kubeconform = "0.7.0"

[hooks]
postinstall = "lefthook install"
