---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Pull Request: Validate"

on:
  pull_request:
    branches: ["main"]
    paths: ["kubernetes/**"]
concurrency:
  group: ${{ github.head_ref }}-pr-validate
  cancel-in-progress: true
env:
  KUBERNETES_DIR: ./kubernetes

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install arkade
        uses: alexellis/setup-arkade@b1816384b2260cfd2c023c6798d26075786cfc7f # v3
      - name: Setup Workflow Tools
        run: arkade get kubeconform kustomize
      - name: Substitute placeholder
        uses: faradaytrs/substitute-secrets-action@dd57c74e8bd9a5987c202c80b1b336eb6ec8b5cf # 2.7
        with:
          input: 'kubernetes/**/*.yaml'
          substitutionRegex: '\$\{(\w+)\}'
          substitutionData: '{"SECRET_DOMAIN":"placeholder.example"}'
          throwOnDataMissing: false
      - name: Run kubeconform
        shell: bash
        run: bash ./scripts/kubeconform.sh ${{ env.KUBERNETES_DIR }}
  flux-test:
    name: Flate - Test
    runs-on: ubuntu-latest
    environment: bot
    permissions:
      contents: read
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
      - name: Substitute placeholder
        uses: faradaytrs/substitute-secrets-action@dd57c74e8bd9a5987c202c80b1b336eb6ec8b5cf # 2.7
        with:
          input: 'kubernetes/**/*.yaml'
          substitutionRegex: '\$\{(\w+)\}'
          substitutionData: '{"S3URL":"https://placeholder.example"}'
          throwOnDataMissing: false
      - name: Install flate
        uses: home-operations/flate/action@main
        with:
          version: latest
      - name: Flate Test
        run: flate test all --path ./kubernetes --allow-missing-secrets
      - name: Undo any changes (if needed)
        run: |
          git checkout -- ./kubernetes
  flux-diff:
    name: Flux Diff
    runs-on: ubuntu-latest
    environment: bot
    permissions:
      contents: read
      pull-requests: write
    strategy:
      matrix:
        resource:
          - hr
          - ks
      fail-fast: false
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      - name: Checkout Pull Request
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: pull
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: Substitute placeholder
        uses: faradaytrs/substitute-secrets-action@dd57c74e8bd9a5987c202c80b1b336eb6ec8b5cf # 2.7
        with:
          input: 'pull/kubernetes/apps/**/*.yaml'
          substitutionRegex: '\$\{(\w+)\}'
          substitutionData: '{"S3URL":"https://placeholder.example"}'
          throwOnDataMissing: false
      - name: Checkout Default Branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: "${{ github.event.repository.default_branch }}"
          path: default
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}
      - name: Substitute placeholder
        uses: faradaytrs/substitute-secrets-action@dd57c74e8bd9a5987c202c80b1b336eb6ec8b5cf # 2.7
        with:
          input: 'default/kubernetes/apps/**/*.yaml'
          substitutionRegex: '\$\{(\w+)\}'
          substitutionData: '{"S3URL":"https://placeholder.example"}'
          throwOnDataMissing: false
      - name: Install flate
        uses: home-operations/flate/action@main
        with:
          version: latest
      - name: Flate Diff
        run: flate diff ${{ matrix.resource }} --path /github/workspace/pull/kubernetes --path-orig /github/workspace/default/kubernetes --allow-missing-secrets --strip-attr --limit-bytes -o json > diff.json
      - name: Build grouped diff comment output
        id: diff_comment
        run: |
          set -e

          # Merge matrix outputs
          if ls diff*.json 1> /dev/null 2>&1; then
            jq -s 'add' diff*.json > merged.json
          else
            cp diff.json merged.json
          fi

          # Build grouped markdown
          COMMENT=$(jq -r '
            def render($title):
              if length == 0 then
                ""
              else
                "## " + $title + "\n\n" +
                map(
                  "### \(.namespace // "default")/\(.name)\n\n```diff\n\(.diff)\n```"
                ) | join("\n\n")
              end;

            {
              hr: map(select(.type == "hr")),
              ks: map(select(.type == "ks"))
            } |
            (
              (if .hr | length > 0 then (.hr | render("HelmRelease (hr)")) else "" end) +
              "\n\n" +
              (if .ks | length > 0 then (.ks | render("Kustomization (ks)")) else "" end)
            )
          ' merged.json)

          # Safe export to GITHUB_OUTPUT
          {
            echo "comment<<EOF"
            echo "$COMMENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - if: ${{ steps.diff_comment.outputs.comment != '' }}
        name: Add Comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          header: ${{ github.event.pull_request.number }}/kubernetes/${{ matrix.resource }}
          message: ${{ steps.diff_comment.outputs.comment }}

  automerge-and-approve:
    needs:
      - kubeconform
      - flux-test
    permissions:
      pull-requests: write
      contents: write
    name: Automerge and Approve build
    runs-on: ubuntu-latest
    environment: bot
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.BOT_APP_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      - name: automerge
        uses: pascalgn/automerge-action@7961b8b5eec56cc088c140b56d864285eabd3f67 # v0.16.4
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          UPDATE_RETRIES: 12
          UPDATE_RETRY_SLEEP: 60000
          MERGE_METHOD: squash
