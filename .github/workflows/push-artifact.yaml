---
name: push-artifact

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "kubernetes/**"
    tags:
      - "*"

jobs:
  flux-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # for pushing
      id-token: write # for signing
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install flux
        uses: controlplaneio-fluxcd/distribution/actions/setup@ffbe51969657cd4f16b05d08f1fb89a420a546d9 # main
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare tags
        id: prep
        run: |
          TAG=latest
          VERSION="${REF_NAME}-${GITHUB_SHA::8}"
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=latest-stable
            VERSION="${REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        env:
          REF_NAME: ${{ github.ref_name }}
      - name: Push artifact
        uses: controlplaneio-fluxcd/distribution/actions/push@ffbe51969657cd4f16b05d08f1fb89a420a546d9 # main
        id: push
        with:
          repository: ghcr.io/${{ github.repository }}
          path: "./"
          diff-tag: ${{ steps.prep.outputs.tag }}
          tags: ${{ steps.prep.outputs.version }}
      - name: Sign artifact
        if: steps.push.outputs.pushed == 'true'
        run: cosign sign --yes $DIGEST_URL
        env:
          DIGEST_URL: ${{ steps.push.outputs.digest-url }}
