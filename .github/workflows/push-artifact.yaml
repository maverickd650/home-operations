---
name: push-artifact

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - "kubernetes/**"
    tags:
      - "*"

jobs:
  flux-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # for pushing
      id-token: write # for signing
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install flux
        uses: controlplaneio-fluxcd/distribution/actions/setup@ea3331576d7ef54d3b1b531c01d7429653cd3cea # main
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare tags
        id: prep
        run: |
          TAG=latest
          VERSION="${REF_NAME}-${GITHUB_SHA::8}"
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=latest-stable
            VERSION="${REF_NAME}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
        env:
          REF_NAME: ${{ github.ref_name }}
      - name: Push artifact
        uses: controlplaneio-fluxcd/distribution/actions/push@ea3331576d7ef54d3b1b531c01d7429653cd3cea # main
        id: push
        with:
          repository: ghcr.io/${{ github.repository }}
          path: "./"
          diff-tag: ${{ steps.prep.outputs.tag }}
          tags: ${{ steps.prep.outputs.version }}
      - name: Sign artifact
        if: steps.push.outputs.pushed == 'true'
        run: cosign sign --yes $DIGEST_URL
        env:
          DIGEST_URL: ${{ steps.push.outputs.digest-url }}
